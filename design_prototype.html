}/*EDITMODE-END*/;

function App() {
  return (
    <AppWithTweaks />
  );
}

function AppWithTweaks() {

  const colors = COLOR_PALETTES[tweaks.palette];
  
  return (
    <>

      </DesignCanvas>

        <TweakSection title="Renk Paleti">

            label="Tema"
            value={tweaks.palette}

// Layout 1: Streak'e büyük vurgu, hero kart tarzı
function LayoutStreakHero({ tweaks, colors }) {
  const [weather, setWeather] = React.useState(null);
  
  React.useEffect(() => {
    // İstanbul için hava durumu
    fetch('https://wttr.in/Istanbul?format=j1')
      .then(res => res.json())
      .then(data => {
        const current = data.current_condition[0];
        setWeather({
          temp: current.temp_C,
          desc: current.weatherDesc[0].value,
          icon: getWeatherIcon(current.weatherCode)
        });
      })
      .catch(() => {
        // Fallback - API çalışmazsa
        setWeather({
          temp: '22',
          desc: 'Parçalı Bulutlu',
          icon: '⛅'
        });
      });
  }, []);
  
  const commonStyles = getCommonStyles(colors, tweaks);
  
  return (
    <div style={commonStyles.shell}>
      <TopBar colors={colors} tweaks={tweaks} />
      
      <div style={commonStyles.scroll}>
        {/* Giant Streak Hero */}
        <div style={{
          margin: '20px 16px',
          background: colors.accent1,
          borderRadius: '24px',
          padding: '32px 24px',
          position: 'relative',
          overflow: 'hidden',
          boxShadow: `0 0 40px ${colors.glow}`,
          border: `4px solid ${colors.accent2}`,
          ...commonStyles.pixelBorder,
        }}>
          {tweaks.crtEffect && <CRTEffect colors={colors} />}
          
          <div style={{
            textAlign: 'center',
            position: 'relative',
            zIndex: 2,
          }}>
            <div style={{
              fontSize: '16px',
              color: 'rgba(255,255,255,0.8)',
              marginBottom: '16px',
              textTransform: 'uppercase',
              letterSpacing: '2px',
            }}>
              🔥 Hafta Serisi 🔥
            </div>
            
            <div style={{
              fontSize: '96px',
              fontFamily: "'Press Start 2P', monospace",
              color: '#fff',
              lineHeight: 1,
              textShadow: `4px 4px 0 rgba(0,0,0,0.3)`,
              marginBottom: '8px',
              animation: tweaks.animateStreak ? 'pulse 2s ease-in-out infinite' : 'none',
            }}>
              7
            </div>
            
            <div style={{
              fontSize: '18px',
              color: 'rgba(255,255,255,0.9)',
              marginTop: '12px',
            }}>
              HAFTA ÜSTÜSTE!
            </div>
            
            <div style={{
              marginTop: '24px',
              display: 'flex',
              justifyContent: 'center',
              gap: '24px',
            }}>
              <StatBubble label="Enikgül" value="7" color="#fff" />
              <StatBubble label="Eniş" value="5" color="rgba(255,255,255,0.6)" />
            </div>
          </div>
        </div>
        
        {/* HAVA DURUMU */}
        <SectionHeader colors={colors} tweaks={tweaks}>HAVA DURUMU</SectionHeader>
        
        <div style={{
          margin: '12px 16px',
          background: colors.accent1,
          borderRadius: '16px',
          padding: '24px',
          border: `4px solid ${colors.bg0}`,
          boxShadow: `0 0 0 4px ${colors.accent1}`,
          cursor: 'pointer',
          transition: 'transform 0.1s',
          position: 'relative',
          overflow: 'hidden',
        }}
        onMouseEnter={(e) => e.currentTarget.style.transform = 'scale(1.02)'}
        onMouseLeave={(e) => e.currentTarget.style.transform = 'scale(1)'}
        >
          {tweaks.scanlines && <Scanlines />}
          
          <div style={{
            fontSize: '14px',
            color: 'rgba(255,255,255,0.7)',
            marginBottom: '8px',
            textTransform: 'uppercase',
          }}>
            8 Mayıs Cuma • İstanbul
          </div>
          
          <div style={{
            display: 'flex',
            alignItems: 'center',
            gap: '20px',
            marginBottom: '12px',
          }}>
            <div style={{
              fontSize: '64px',
              lineHeight: 1,
            }}>
              {weather ? weather.icon : '⏳'}
            </div>
            
            <div>
              <div style={{
                fontSize: '48px',
                fontFamily: "'Press Start 2P', monospace",
                color: '#fff',
                lineHeight: 1,
                marginBottom: '8px',
              }}>
                {weather ? weather.temp : '--'}°C
              </div>
              
              <div style={{
                fontSize: '16px',
                color: 'rgba(255,255,255,0.8)',
              }}>
                {weather ? weather.desc : 'Yükleniyor...'}
              </div>
            </div>
          </div>
          
          <div style={{
            fontSize: '14px',
            color: 'rgba(255,255,255,0.7)',
            marginTop: '12px',
          }}>
            Bugün antrenman için harika! 💪
          </div>
        </div>
        
        {/* User cards - görsel/ikonografik */}
        <SectionHeader colors={colors} tweaks={tweaks}>BUGÜN</SectionHeader>
        
        <div style={{
          margin: '12px 16px',
          display: 'grid',
          gridTemplateColumns: '1fr 1fr',
          gap: '12px',
        }}>
          <UserCardPixel 
            name="Enikgül"
            initials="EG" 
            status="C1 ✓"
            moves="6 moves"
            color={colors.accent1}
            done={true}
            colors={colors}
            tweaks={tweaks}
          />
          <UserCardPixel 
            name="Eniş"
            initials="EN" 
            status="Pending"
            moves=""
            color={colors.amber}
            done={false}
            colors={colors}
            tweaks={tweaks}
          />
        </div>
        
        {/* Bu Hafta */}
        <SectionHeader colors={colors} tweaks={tweaks}>BU HAFTA</SectionHeader>
        
        <div style={{
          margin: '12px 16px',
          display: 'grid',
          gridTemplateColumns: '1fr 1fr',
          gap: '12px',
        }}>
          <StatCard value="3" label="Enikgül" color={colors.accent1} colors={colors} tweaks={tweaks} />
          <StatCard value="2" label="Eniş" color={colors.amber} colors={colors} tweaks={tweaks} />
        </div>
      </div>
      
      <BottomNav colors={colors} />
      
      <style>{`
        @keyframes pulse {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.05); }
        }
        @keyframes glitch {
          0% { transform: translate(0); }
          20% { transform: translate(-2px, 2px); }
          40% { transform: translate(-2px, -2px); }
          60% { transform: translate(2px, 2px); }
          80% { transform: translate(2px, -2px); }
          100% { transform: translate(0); }
        }
        @keyframes scan {
          0% { transform: translateY(-100%); }
          100% { transform: translateY(100%); }
        }
      `}</style>
    </div>
  );
}

        setWeather({ temp: '22', desc: 'Parçalı Bulutlu', icon: '⛅' });

function getWeatherIcon(code) {
  const codeNum = parseInt(code);
  if (codeNum === 113) return '☀️';
  if (codeNum === 116) return '⛅';
  if (codeNum === 119 || codeNum === 122) return '☁️';
  if (codeNum === 143 || codeNum === 248 || codeNum === 260) return '🌫️';
  if ([176, 263, 266, 293, 296].includes(codeNum)) return '🌦️';
  if ([179, 182, 185, 281, 284, 311, 314, 317, 350, 362, 365, 374].includes(codeNum)) return '🌨️';
  if ([200, 386, 389].includes(codeNum)) return '⛈️';
  if ([299, 302, 305, 308, 356, 359].includes(codeNum)) return '🌧️';
  if ([227, 230, 323, 326, 329, 332, 335, 338, 368, 371, 377, 392, 395].includes(codeNum)) return '❄️';
  return '🌤️';
}
